version: '3.8'

services:
  db:
    image: postgres:15
    container_name: retopaes_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: retopaes
    ports:
      - "5433:5432" # Usamos el 5433 por si tu PostgreSQL nativo ya está ocupando el 5432
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: